name: Deploy Github Pages

on: 
  push: 
    branches: 
     - main

jobs: 
  build-and-deploy:
  runs-on: ubuntu-latest
  steps: 
  - name: Checkout
    uses: actions/checkout@v3
  
  - name: Install and Build
    run: |
    pnpm install
    pnpm build && touch ./out/.nojekyll

  - name: Deploy
    uses: JamesIves/github-pages-deploy-action@v4
    with: 
      branch: gh-pages
      folder: out