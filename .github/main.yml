name: Deploy Github Pages

on: 
  push: 
    branches: 
     - main

jobs: 
  build-and-deploy:
  runs-on: ubuntu-latest
  steps: 
  - name: Checkout
    uses: actions/checkout@v3
  
  - name: Install
    run: pnpm install

  - name: Build
    run: pnpm build

  - name: Deploy
    run: pnpm run deploy